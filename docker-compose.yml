services:
  db:
    image: postgres:14
    container_name: saberpro_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-saberpro}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-saberpro}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: saberpro_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saberpro_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DB_NAME: ${POSTGRES_DB:-saberpro}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_HOST: db
      DB_PORT: 5432
      CHANNELS_REDIS_URL: redis://redis:6379/0
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,[::1]
      DJANGO_CSRF_TRUSTED_ORIGINS: http://localhost:8000
      LATEX_COMPILER: ${LATEX_COMPILER:-/usr/local/bin/tectonic}
      LATEX_POPPLER_PATH: ${LATEX_POPPLER_PATH:-/usr/bin}
    ports:
      - "8000:8000"
    working_dir: /app
    command: >
      sh -c "python manage.py migrate &&
             daphne -b 0.0.0.0 -p 8000 core.asgi:application"
    volumes:
      - ./backend/media:/app/media

volumes:
  postgres_data:
